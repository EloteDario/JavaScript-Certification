<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theme Switcher</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

  <button aria-haspopup="true"id="theme-switcher-button" aria-expanded="false" aria-controls="theme-dropdown">Switch Theme</button>

  <ul id="theme-dropdown" role="menu" aria-labelledby="theme-switcher-button" hidden> 
    <li id="theme-light"role="menuitem">light</li>
    <li id="theme-dark"role="menuitem">dark</li>
  </ul>
  
  <div id="theme-announcer" aria-live="polite"></div>

  <script src="./script.js"></script>
</body>
</html>
